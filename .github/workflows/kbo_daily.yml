name: KBO Daily Update

on:
  schedule:
    - cron: '30 13 * * 2,3,4,5,6,0'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - name: 체크아웃
      uses: actions/checkout@v3

    - name: Python 설치
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 패키지 설치
      run: |
        pip install selenium webdriver-manager pandas scikit-learn

    - name: Chrome 설치
      run: |
        sudo apt-get update
        sudo apt-get install -y chromium-browser chromium-chromedriver

    - name: 데이터 업데이트
      run: python kbo_update.py

    - name: 예측 검증
      run: python kbo_verify.py

    - name: 다음 경기 예측
      run: python kbo_predict.py

    - name: 결과 저장
      run: |
        git config user.email "action@github.com"
        git config user.name "GitHub Action"
        git add kbo_odds.csv || true
        git add kbo_predictions.json || true
        git add kbo_verify_log.csv || true
        git diff --staged --quiet || git commit -m "자동 업데이트 $(date '+%Y-%m-%d')"
        git push || true